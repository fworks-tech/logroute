name: logroute

services:
  db:
    image: postgres:15-alpine
    container_name: logroute-db
    environment:
      POSTGRES_DB: logroute
      POSTGRES_USER: logroute
      POSTGRES_PASSWORD: logroute
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logroute -d logroute"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: logroute-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    name: logroute-postgres-data
